# Nextest configuration for assistant workspace
#
# Container-only enforcement (Invariant 009):
# The setup-require-container script blocks bare-host test execution across
# all workspace packages. See docs/invariant/009_container_only_test_execution.md

[experimental]
setup-scripts = true

[scripts.setup.require-container]
command = ".config/setup-require-container"

[[profile.default.scripts]]
filter = "all()"
setup = ["require-container"]

# ── Existing overrides ─────────────────────────────────────────────────────────
#
# dry_run_test invokes the real `claude` binary which takes 60-120s under load.
# Without this override, nextest treats the test as hung and cancels it.
#
# lim_it tests require valid live Anthropic API credentials; they run by default
# in container environments where ~/.claude is mounted via plugin_mount.
#
[profile.default]

[[profile.default.overrides]]
filter = "binary(dry_run_test)"
slow-timeout = { period = "120s", terminate-after = 10 }

# bug_reproducers_239_244_test includes timeout tests (BUG-243) that spawn
# real subprocesses. Per-test limit prevents indefinite hangs if kill() is
# silently ignored in a restricted container environment.
[[profile.default.overrides]]
filter = "binary(bug_reproducers_239_244_test)"
slow-timeout = { period = "30s", terminate-after = 1 }

# ps/kill tests share the `find_claude_processes()` resource: ps tests check for
# 0 sessions while kill tests spawn fake ELF `claude` processes visible to that
# scan.  All four binaries must run serially to prevent false no-session failures
# in ps tests and mismatched-PID kills in kill tests.
[test-groups]
ps-serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = "binary(user_story_ps_test) | binary(ps_command_test) | binary(kill_command_test) | binary(user_story_kill_test) | binary(ps_mode_test) | binary(ps_columns_test) | binary(ps_wide_test) | binary(ps_pid_test) | binary(ps_inspect_test) | binary(ps_flags_test) | binary(param_group_test)"
test-group = "ps-serial"
