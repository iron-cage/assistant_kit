# Claude Code Profile CLI Commands
# Following unilang v0.35+ schema
# Metadata-only export — not aggregated by build.rs; profile uses programmatic registration

- name: ".accounts"
  namespace: ""
  description: "List all saved accounts with field-presence control"
  hint: "List accounts"
  version: "2.0.0"
  status: "stable"
  aliases: []
  tags: ["profile", "account"]
  permissions: []
  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "name"
      kind: "String"
      description: "Scope output to a single named account"
      hint: "Account name"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []

    - name: "active"
      kind: "Boolean"
      description: "Show active/inactive status per account (default on)"
      hint: "Show Active: line"
      optional: true
      default: "true"
      validation_rules: []
      aliases: []
      tags: []

    - name: "sub"
      kind: "Boolean"
      description: "Show subscription type per account (default on)"
      hint: "Show Sub: line"
      optional: true
      default: "true"
      validation_rules: []
      aliases: []
      tags: []

    - name: "tier"
      kind: "Boolean"
      description: "Show rate-limit tier per account (default on)"
      hint: "Show Tier: line"
      optional: true
      default: "true"
      validation_rules: []
      aliases: []
      tags: []

    - name: "expires"
      kind: "Boolean"
      description: "Show token expiry duration per account (default on)"
      hint: "Show Expires: line"
      optional: true
      default: "true"
      validation_rules: []
      aliases: []
      tags: []

    - name: "email"
      kind: "Boolean"
      description: "Show email address per account (default on)"
      hint: "Show Email: line"
      optional: true
      default: "true"
      validation_rules: []
      aliases: []
      tags: []

    - name: "display_name"
      kind: "Boolean"
      description: "Show display name from saved ~/.claude.json snapshot (opt-in)"
      hint: "Show Display: line"
      optional: true
      default: "false"
      validation_rules: []
      aliases: []
      tags: []

    - name: "role"
      kind: "Boolean"
      description: "Show organisation role from saved ~/.claude.json snapshot (opt-in)"
      hint: "Show Role: line"
      optional: true
      default: "false"
      validation_rules: []
      aliases: []
      tags: []

    - name: "billing"
      kind: "Boolean"
      description: "Show billing type from saved ~/.claude.json snapshot (opt-in)"
      hint: "Show Billing: line"
      optional: true
      default: "false"
      validation_rules: []
      aliases: []
      tags: []

    - name: "model"
      kind: "Boolean"
      description: "Show active model (always N/A for saved accounts — settings.json not captured) (opt-in)"
      hint: "Show Model: line"
      optional: true
      default: "false"
      validation_rules: []
      aliases: []
      tags: []

    - name: "current"
      kind: "Boolean"
      description: "Show current (live) account line; suppressed when ~/.claude/.credentials.json is unreadable (default on)"
      hint: "Show Current: line"
      optional: true
      default: "true"
      validation_rules: []
      aliases: []
      tags: []

    - name: "format"
      kind: "String"
      description: "Output format (text, json, or table)"
      hint: "Output format"
      optional: true
      default: "text"
      validation_rules: []
      aliases: ["fmt"]
      tags: []

  examples:
    - ".accounts"
    - ".accounts name::alice@acme.com"
    - ".accounts active::0 sub::0 current::0"
    - ".accounts display_name::1 role::1 billing::1 model::1"
    - ".accounts format::json"
    - ".accounts format::table"
  auto_help_enabled: true

