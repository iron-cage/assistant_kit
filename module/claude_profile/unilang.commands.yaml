- name: ".usage"
  namespace: ""
  description: "Show live rate-limit quota for all saved accounts"
  hint: "Show live quota"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["profile", "usage"]
  permissions: []
  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "format"
      kind: "String"
      description: "Output format (text or json)"
      hint: "Output format"
      optional: true
      default: "text"
      validation_rules: []
      aliases: ["fmt"]
      tags: []

    - name: "refresh"
      kind: "Integer"
      description: "Retry once on 401/403 (auth errors) or 429 when token is locally expired, via isolated subprocess (1 = enabled, default; 0 = disabled)"
      hint: "Retry on auth/expired"
      optional: true
      default: "1"
      validation_rules: []
      aliases: []
      tags: []

    - name: "live"
      kind: "Integer"
      description: "Continuous monitor mode (0 = off, default; 1 = on)"
      hint: "Live monitor"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "interval"
      kind: "Integer"
      description: "Seconds between refreshes (minimum 30, default 30)"
      hint: "Refresh interval"
      optional: true
      default: "30"
      validation_rules: []
      aliases: []
      tags: []

    - name: "jitter"
      kind: "Integer"
      description: "Max random seconds added to interval (0 = none, default)"
      hint: "Interval jitter"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

  examples:
    - ".usage"
    - ".usage format::json"
    - ".usage refresh::1"
    - ".usage live::1"
    - ".usage live::1 interval::60 jitter::10"
  auto_help_enabled: true

