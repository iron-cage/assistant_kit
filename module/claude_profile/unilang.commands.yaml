- name: ".account.save"
  namespace: ""
  description: "Save current credentials as a named account profile"
  hint: "Save account"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["profile", "account", "mutation"]
  permissions: []
  idempotent: false
  deprecation_message: ""
  http_method_hint: "POST"

  arguments:
    - name: "name"
      kind: "String"
      description: "Account name to save as"
      hint: "Account name"
      optional: false
      validation_rules: []
      aliases: []
      tags: []

    - name: "dry"
      kind: "Boolean"
      description: "Preview without executing (1=dry-run)"
      hint: "Dry-run mode"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

  examples:
    - ".account.save name::work"
    - ".account.save name::personal dry::1"
  auto_help_enabled: true

