- name: ".account.renewal"
  namespace: ""
  description: "Set or clear a billing renewal timestamp override for one or more accounts"
  hint: "Set/clear renewal override"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["profile", "account", "mutation"]
  permissions: []
  idempotent: false
  deprecation_message: ""
  http_method_hint: "POST"

  arguments:
    - name: "name"
      kind: "String"
      description: "Account name, `all`, or comma-separated list of accounts"
      hint: "Account name or 'all'"
      optional: false
      default: ""
      validation_rules: []
      aliases: []
      tags: []

    - name: "at"
      kind: "String"
      description: "Set exact renewal timestamp (ISO-8601 UTC, e.g. 2026-06-29T21:00:00Z); mutually exclusive with from_now:: and clear::"
      hint: "Absolute renewal timestamp"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []

    - name: "from_now"
      kind: "String"
      description: "Set renewal relative to now (e.g. +1h30m, -30m, +0m); mutually exclusive with at:: and clear::"
      hint: "Signed duration delta from now"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []

    - name: "clear"
      kind: "Boolean"
      description: "Remove the renewal override (restores ~-prefixed estimate in .usage); mutually exclusive with at:: and from_now::"
      hint: "Clear renewal override"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "dry"
      kind: "Boolean"
      description: "Preview operation without writing files"
      hint: "Dry-run mode"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

  examples:
    - ".account.renewal name::alice@acme.com at::2026-06-29T21:00:00Z"
    - ".account.renewal name::all from_now::+0m"
    - ".account.renewal name::alice@acme.com clear::1"
    - ".account.renewal name::alice@acme.com at::2026-06-29T21:00:00Z dry::1"
  auto_help_enabled: true

