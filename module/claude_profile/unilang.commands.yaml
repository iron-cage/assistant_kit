# Claude Code Profile CLI Commands
# Following unilang v0.35+ schema
# Metadata-only export — not aggregated by build.rs; profile uses programmatic registration

- name: ".account.list"
  namespace: ""
  description: "List all saved accounts with subscription type and token state"
  hint: "List all accounts"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["profile", "account"]
  permissions: []
  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "verbosity"
      kind: "Integer"
      description: "Output detail level (0=minimal, 1=labeled, 2=verbose)"
      hint: "Output verbosity level"
      optional: true
      default: "1"
      validation_rules: []
      aliases: ["v"]
      tags: []

    - name: "format"
      kind: "String"
      description: "Output format (text or json)"
      hint: "Output format"
      optional: true
      default: "text"
      validation_rules: []
      aliases: ["fmt"]
      tags: []

  examples:
    - ".account.list"
    - ".account.list format::json"
  auto_help_enabled: true

