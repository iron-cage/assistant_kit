  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "name"
      kind: "String"
      description: "Query a specific account by name instead of the active account"
      hint: "Account name"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []

    - name: "verbosity"
      kind: "Integer"
      description: "Output detail level"
      hint: "Output verbosity level"
      optional: true
      default: "1"
      validation_rules: []
      aliases: ["v"]
      tags: []

    - name: "format"
      kind: "String"
      description: "Output format (text or json)"
      hint: "Output format"
      optional: true
