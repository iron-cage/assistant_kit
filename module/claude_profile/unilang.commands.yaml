  arguments:
    - name: "name"
      kind: "String"
      description: "Account name to re-authenticate (omit to use the active account)"
      hint: "Account name"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []

    - name: "dry"
      kind: "Boolean"
      description: "Preview without executing (1=dry-run)"
      hint: "Dry-run mode"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
