# docker image tag — used for -t at build and image lookup at run; unique per module
image: claude_profile_test

# non-root so chmod-000 file-permission tests fail correctly (root bypasses checks)
test_user: testuser
# crate scope for cargo chef cook — scoped to claude_profile to avoid pre-compiling test
# binaries for all 15 workspace crates (--workspace peaks at 107 GB of intermediate
# artifacts and exhausts the 109 GB free disk). claude_profile's transitive deps (including
# all dev-dep chains like assert_cmd → anstyle) are fully pre-cooked at this scope.
# nextest workspace metadata uses the full registry populated by `cargo fetch` in the
# test stage, so --offline cargo metadata succeeds regardless of cook scope.
# Test execution is controlled by test_script (l1), not this field.
cmd_scope: -p claude_profile
# baked into the image default CMD; all() runs every test — lim_it tests skip automatically without credentials
cmd_filter: "all()"

# script invoked by `.test` inside the container (path relative to /workspace)
test_script: module/claude_profile/verb/test.d/l1

# script invoked by `.lint` inside the container (path relative to /workspace)
lint_script: module/claude_profile/verb/lint.d/l1

# script invoked by `.run` inside the container (path relative to /workspace)
run_script: module/claude_profile/verb/run.d/l1

# optional binary plugin: name:container_path (binary found via 'which name' on host)
bin_plugin: w3:/usr/local/bin/w3
# container mount point for bin_plugin working volume (persists compilation artifacts)
bin_plugin_volume: /tmp/will_test_targets
# data directory plugin: host_path:container_path:check_type
# .test mounts as required+rw; .shell mounts as optional+ro
plugin_mount: ~/.claude:/workspace/.claude:directory


