- name: ".journal.list"
  namespace: ""
  category: "journal"
  description: "Display a filtered event table from the CLR journal (default: last 50 events)"
  hint: "List journal events"
  version: "0.1.0"
  status: "stable"
  aliases: []
  tags: ["journal", "list"]
  permissions: []
  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"
  arguments:
    - name: "since"
      kind: "String"
      description: "Show events newer than this duration (e.g. 1h, 7d, 2w)"
      hint: "Time window start"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
    - name: "until"
      kind: "String"
      description: "Show events older than this duration"
      hint: "Time window end"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
    - name: "type"
      kind: "String"
      description: "Filter by event type (execution, credential, gate_wait, retry, timeout, runner_retry, validation_retry, interactive)"
      hint: "Event type filter"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
    - name: "command"
      kind: "String"
      description: "Filter by command name (run, ask, isolated, refresh)"
      hint: "Command filter"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
    - name: "exit_code"
      kind: "Integer"
      description: "Filter by exit code"
      hint: "Exit code filter"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
    - name: "model"
      kind: "String"
      description: "Filter by model name substring"
      hint: "Model filter"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
    - name: "limit"
      kind: "Integer"
      description: "Maximum number of events to return (default: 50)"
      hint: "Result limit"
      optional: true
      default: 50
      validation_rules: []
      aliases: []
      tags: []
    - name: "format"
      kind: "String"
      description: "Output format: table (default) or json"
      hint: "Output format"
      optional: true
      default: "table"
      validation_rules: []
      aliases: []
      tags: []
    - name: "dir"
      kind: "String"
      description: "Journal directory override (default: ~/.clr/journal/)"
      hint: "Journal dir"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
  examples:
  - .journal.list
  - .journal.list since::1d
  - .journal.list since::1h format::json
  - .journal.list type::execution exit_code::0
  auto_help_enabled: true

