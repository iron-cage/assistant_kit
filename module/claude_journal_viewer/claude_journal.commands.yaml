- name: ".journal.prune"
  namespace: ""
  category: "journal"
  description: "Delete journal files older than the keep window (default: 30d)"
  hint: "Prune old journal files"
  version: "0.1.0"
  status: "stable"
  aliases: []
  tags: ["journal", "prune"]
  permissions: []
  idempotent: false
  deprecation_message: ""
  http_method_hint: "DELETE"
  arguments:
    - name: "keep"
      kind: "String"
      description: "Retention window — files older than this are deleted (default: 30d)"
      hint: "Retention period"
      optional: true
      default: "30d"
      validation_rules: []
      aliases: []
      tags: []
    - name: "dry_run"
      kind: "Boolean"
      description: "List files that would be deleted without removing them"
      hint: "Dry run"
      optional: true
      default: false
      validation_rules: []
      aliases: []
      tags: []
    - name: "dir"
      kind: "String"
      description: "Journal directory override"
      hint: "Journal dir"
      optional: true
      default: ""
      validation_rules: []
      aliases: []
      tags: []
  examples:
  - .journal.prune keep::30d dry_run::1
  - .journal.prune keep::7d
  auto_help_enabled: true

