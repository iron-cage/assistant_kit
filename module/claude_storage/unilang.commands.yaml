  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "target"
      kind: "String"
      description: "What to count (projects, sessions, entries)"
      hint: "Target type"
      optional: true
      validation_rules: []
      aliases: []
      tags: []

    - name: "project"
      kind: "String"
      description: "Project ID (for counting sessions or entries)"
      hint: "Project ID"
      optional: true
      validation_rules: []
      aliases: []
      tags: []

    - name: "session"
      kind: "String"
      description: "Session ID (for counting entries)"
      hint: "Session ID"
      optional: true
