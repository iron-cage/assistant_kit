- name: ".search"
  namespace: ""
  description: "Search session content for query string"
  hint: "Search session content"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["storage", "search"]
  permissions: []
  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "query"
      kind: "String"
      description: "Search query string (case-insensitive by default)"
      hint: "Search query"
      optional: false
      validation_rules: []
      aliases: ["q"]
      tags: []

    - name: "project"
      kind: "String"
      description: "Project ID filter (searches only this project)"
      hint: "Project ID"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["filter"]

    - name: "session"
      kind: "String"
      description: "Session ID filter (searches only this session)"
      hint: "Session ID"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["filter"]

    - name: "case_sensitive"
      kind: "Boolean"
      description: "Enable case-sensitive matching"
      hint: "Case-sensitive search"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "entry_type"
      kind: "String"
      description: "Filter by entry type (user, assistant, or all)"
      hint: "Entry type filter"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["filter"]

    - name: "verbosity"
      kind: "Integer"
      description: "Output detail level (0-5, default: 1)"
      hint: "Output verbosity level"
      optional: true
      default: "1"
      validation_rules: []
      aliases: ["v"]
      tags: []

  examples:
    - ".search query::error"
    - ".search query::\"session management\" case_sensitive::1"
    - ".search query::help entry_type::user"
    - ".search query::implement project::abc123"
  auto_help_enabled: true

