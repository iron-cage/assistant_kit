- name: ".sessions"
  namespace: ""
  description: "Show active-session summary (default) or family-grouped session list with scope control"
  hint: "Active session summary or family-grouped list"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["storage", "session", "list"]
  permissions: []
  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "scope"
      kind: "String"
      description: "Session discovery scope (local, relevant, under, global; default: under)"
      hint: "Discovery scope"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["scope"]

    - name: "path"
      kind: "String"
      description: "Base path for scope resolution (default: current directory)"
      hint: "Base path"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["scope", "filter"]

    - name: "session"
      kind: "String"
      description: "Filter sessions by ID substring (case-insensitive)"
      hint: "Session ID substring filter"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["filter"]

    - name: "agent"
      kind: "Boolean"
      description: "Session type filter (0=main only, 1=agent only, unset=all)"
      hint: "Agent session filter"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["filter"]

    - name: "min_entries"
      kind: "Integer"
      description: "Filter by minimum entry count"
      hint: "Minimum entries filter"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["filter"]

    - name: "limit"
      kind: "Integer"
      description: "Max main sessions to display per project at verbosity 1 (0 = unlimited, default: 0)"
      hint: "Per-project display limit"
      optional: true
      validation_rules: []
      aliases: []
      tags: ["output"]

    - name: "verbosity"
      kind: "Integer"
      description: "Output detail level (0-5, default: 1)"
      hint: "Output verbosity level"
      optional: true
      validation_rules: []
      aliases: ["v"]
      tags: []

  examples:
    - ".sessions"
    - ".sessions scope::relevant"
    - ".sessions scope::under path::/home/user1/pro"
    - ".sessions scope::global agent::1 min_entries::50"
    - ".sessions scope::local session::abc123"
    - ".sessions limit::5"
  auto_help_enabled: true

