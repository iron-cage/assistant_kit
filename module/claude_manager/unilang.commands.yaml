- name: ".version.install"
  namespace: ""
  description: "Download and install a Claude Code version via installer"
  hint: "Install a specific version"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["manager", "version", "mutation"]
  permissions: []
  idempotent: false
  deprecation_message: ""
  http_method_hint: "POST"

  arguments:
    - name: "version"
      kind: "String"
      description: "Version to install (semver or alias)"
      hint: "Target version"
      optional: true
      validation_rules: []
      aliases: []
      tags: []

    - name: "dry"
      kind: "Boolean"
      description: "Preview without executing (1=dry-run)"
      hint: "Dry-run mode"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "force"
      kind: "Boolean"
      description: "Force install even if version matches (1=force)"
      hint: "Force install"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "verbosity"
      kind: "Integer"
      description: "Output detail level"
      hint: "Output verbosity level"
      optional: true
      default: "1"
      validation_rules: []
      aliases: ["v"]
      tags: []

    - name: "format"
      kind: "String"
      description: "Output format (text or json)"
      hint: "Output format"
      optional: true
      default: "text"
      validation_rules: []
      aliases: ["fmt"]
      tags: []

  examples:
    - ".version.install version::2.1.0"
    - ".version.install version::latest dry::1"
  auto_help_enabled: true

- name: ".version.guard"
  namespace: ""
  description: "Check for version drift and restore preferred version"
  hint: "Guard preferred version"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["manager", "version", "mutation"]
  permissions: []
  idempotent: false
  deprecation_message: ""
  http_method_hint: "POST"

  arguments:
    - name: "version"
      kind: "String"
      description: "Preferred version spec to guard"
      hint: "Version spec"
      optional: true
      validation_rules: []
      aliases: []
      tags: []

    - name: "dry"
      kind: "Boolean"
      description: "Preview without executing (1=dry-run)"
      hint: "Dry-run mode"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "force"
      kind: "Boolean"
      description: "Force reinstall even if version matches (1=force)"
      hint: "Force reinstall"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "interval"
      kind: "Integer"
      description: "Check interval in seconds (0=one-shot)"
      hint: "Check interval"
      optional: true
      default: "0"
      validation_rules: []
      aliases: []
      tags: []

    - name: "verbosity"
      kind: "Integer"
      description: "Output detail level"
      hint: "Output verbosity level"
      optional: true
      default: "1"
      validation_rules: []
      aliases: ["v"]
      tags: []

  examples:
    - ".version.guard version::stable"
