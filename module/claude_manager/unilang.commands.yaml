# Claude Code Manager CLI Commands
# Following unilang v0.35+ schema
# Metadata-only export — not aggregated by build.rs; manager uses programmatic registration

- name: ".status"
  namespace: ""
  description: "Show installation state, process count, and active account"
  hint: "Show installation status"
  version: "1.0.0"
  status: "stable"
  aliases: []
  tags: ["manager", "info"]
  permissions: []
  idempotent: true
  deprecation_message: ""
  http_method_hint: "GET"

  arguments:
    - name: "verbosity"
      kind: "Integer"
      description: "Output detail level (0=minimal, 1=labeled)"
      hint: "Output verbosity level"
      optional: true
      default: "1"
      validation_rules: []
      aliases: ["v"]
      tags: []

    - name: "format"
      kind: "String"
      description: "Output format (text or json)"
      hint: "Output format"
      optional: true
      default: "text"
      validation_rules: []
      aliases: ["fmt"]
      tags: []

  examples:
    - ".status"
    - ".status format::json"
  auto_help_enabled: true

